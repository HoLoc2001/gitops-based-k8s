name: Release CI

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: my-app
  BRANCH_NAME: main

jobs:
  build-push-update-helm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}
          fetch-depth: 0

      - name: Get release tag
        run: echo "IMAGE_TAG=${{ github.event.release.tag_name }}" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build and push multi-arch image
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_REPOSITORY=$AWS_ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/eks/${ECR_REPOSITORY}
          IMAGE_URI=$IMAGE_REPOSITORY:${IMAGE_TAG}

          docker buildx build --platform linux/amd64,linux/arm64 --push -t $IMAGE_URI ./app

          echo "IMAGE_REPOSITORY=$IMAGE_REPOSITORY" >> $GITHUB_ENV

      - name: Update Helm values.yaml
        run: |
          sed -i "s|repository: .*|repository: \"${IMAGE_REPOSITORY}\"|" helm/my-app/values.yaml
          sed -i "s|tag: .*|tag: \"${IMAGE_TAG}\"|" helm/my-app/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add helm/my-app/values.yaml
          git commit -m "Release ${IMAGE_TAG}: update image tag" || echo "No changes"
          git push origin HEAD:${BRANCH_NAME}