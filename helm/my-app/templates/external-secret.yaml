apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Chart.Name }}-secret
spec:
  refreshInterval: {{ .Values.vault.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.vault.secretStoreName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Chart.Name }}-secret
  data:
    - secretKey: DB_HOST
      remoteRef:
        key: {{ .Values.vault.path }}
        property: DB_HOST

    - secretKey: DB_USERNAME
      remoteRef:
        key: {{ .Values.vault.path }}
        property: DB_USERNAME

    - secretKey: DB_PASSWORD
      remoteRef:
        key: {{ .Values.vault.path }}
        property: DB_PASSWORD

    - secretKey: DB_NAME
      remoteRef:
        key: {{ .Values.vault.path }}
        property: DB_NAME
        