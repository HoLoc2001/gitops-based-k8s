replicaCount: 2

image:
  repository: "620969609526.dkr.ecr.ap-southeast-1.amazonaws.com/eks/my-app"
  tag: "v1.0.5"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000


ingress:
  enabled: true
  className: alb
  # host: test.aws.com
  path: /
  pathType: Prefix
  
env:
  NODE_ENV: production
  APP_PORT: "3000"

vault:
  enabled: true
  secretStoreName: vault-backend
  path: dev/aurora
  refreshInterval: 1h

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

serviceAccount:
  create: false
  name: default
  annotations: {}

httpRoute:
  enabled: false
  parentRefs: []
  hostnames: []