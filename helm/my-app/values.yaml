replicaCount: 2

image:
  repository: registry.gitlab.com/your-group/my-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000


ingress:
  enabled: true
  className: alb
  # host: my-app.example.com
  
env:
  NODE_ENV: production
  APP_PORT: "3000"

vault:
  enabled: true
  secretStoreName: vault-backend
  path: secret/data/dev/aurora
  refreshInterval: 1h